<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOMINATE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E2C170;
    --gold-dim: rgba(201,168,76,0.35);
    --black: #080808;
    --surface: #111111;
    --surface-2: #181818;
    --text: #EDE8DC;
    --text-muted: #6B6456;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--black);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  /* subtle grid */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* world map canvas */
  #map-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* edge vignette so map fades at borders */
  #map-canvas::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 50%, rgba(8,8,8,0.9) 100%);
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  /* LOGO */
  .logo {
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
    margin-bottom: 48px;
    animation: fadeUp 0.7s ease both;
  }
  .logo-crown svg {
    width: 50px; height: auto;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
  }
  .logo-name {
    font-family: 'Cinzel', serif;
    font-size: 40px; font-weight: 700;
    letter-spacing: 0.22em; color: var(--text);
  }
  .logo-rule { width: 100%; display: flex; align-items: center; gap: 12px; }
  .logo-rule-line { flex: 1; height: 1px; background: var(--gold-dim); }
  .logo-rule-dot { width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

  /* CARD */
  .card {
    width: 100%; max-width: 400px;
    background: rgba(17,17,17,0.92);
    border: 1px solid rgba(201,168,76,0.22);
    padding: 36px 36px 32px;
    animation: fadeUp 0.85s ease both;
    position: relative;
    backdrop-filter: blur(4px);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 16px; height: 16px;
    border-top: 1px solid var(--gold); border-left: 1px solid var(--gold);
  }
  .card::after {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 16px; height: 16px;
    border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold);
  }

  /* MODE TOGGLE */
  .mode-toggle {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 2px; margin-bottom: 28px;
    background: rgba(201,168,76,0.08); padding: 2px;
  }
  .mode-btn {
    padding: 13px 10px;
    background: transparent; border: none; cursor: pointer;
    text-align: center; transition: background 0.2s; position: relative;
  }
  .mode-btn.active { background: var(--surface-2); }
  .mode-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 1px; background: var(--gold);
  }
  .mode-btn-title {
    font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    display: block; color: var(--text-muted); transition: color 0.2s;
  }
  .mode-btn.active .mode-btn-title { color: var(--gold); }
  .mode-btn-sub {
    font-family: 'EB Garamond', serif;
    font-size: 13px; font-style: italic;
    color: var(--text-muted); display: block; margin-top: 2px;
  }
  .ranked-badge {
    display: inline-block;
    font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.22em;
    color: var(--gold); text-transform: uppercase;
    border: 1px solid rgba(201,168,76,0.28); padding: 2px 6px; margin-top: 4px;
  }

  /* FIELDS */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 7px;
  }
  .field input, .field select {
    width: 100%;
    background: rgba(8,8,8,0.9);
    border: 1px solid rgba(201,168,76,0.15);
    color: var(--text);
    padding: 11px 14px;
    font-family: 'EB Garamond', serif; font-size: 17px;
    outline: none; transition: border-color 0.2s; appearance: none;
  }
  .field input::placeholder { color: var(--text-muted); font-style: italic; }
  .field input:focus, .field select:focus { border-color: rgba(201,168,76,0.45); }
  .field select option { background: #111; }
  .field-hint {
    font-family: 'EB Garamond', serif; font-style: italic;
    font-size: 13px; color: var(--text-muted);
    margin-top: 5px; display: block;
  }

  /* SUBMIT */
  .submit-btn {
    width: 100%; margin-top: 10px;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.32em;
    text-transform: uppercase; padding: 15px;
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .submit-btn:hover { background: rgba(201,168,76,0.09); color: var(--text); }

  /* LIVE */
  .live-strip {
    margin-top: 24px;
    display: flex; align-items: center; gap: 7px;
    animation: fadeUp 1s ease both;
  }
  .live-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .live-text {
    font-family: 'Cinzel', serif; font-size: 10px;
    letter-spacing: 0.18em; color: var(--text-muted); text-transform: uppercase;
  }
  .live-count { color: var(--gold); }

  /* FOOTER */
  .footer-links {
    margin-top: 36px; display: flex; gap: 28px;
    list-style: none; animation: fadeUp 1.1s ease both;
  }
  .footer-links a {
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-muted); text-decoration: none; transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--gold); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 28px 22px; }
    .logo-name { font-size: 30px; }
  }
</style>
</head>
<body>

<canvas id="map-canvas"></canvas>

<div class="page">

  <div class="logo">
    <div class="logo-crown">
      <svg viewBox="0 0 100 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 60 L8 44 L26 16 L50 38 L74 16 L92 44 L92 60 Z" fill="#C9A84C" stroke="#8B6914" stroke-width="1.2" stroke-linejoin="round"/>
        <rect x="8" y="60" width="84" height="8" rx="1" fill="#8B6914"/>
        <line x1="8" y1="60" x2="92" y2="60" stroke="#C9A84C" stroke-width="0.8"/>
        <rect x="22" y="10" width="7" height="7" rx="1" transform="rotate(6 22 10)" fill="#C9A84C" stroke="#8B6914" stroke-width="1"/>
        <rect x="46" y="2" width="7" height="7" rx="1" fill="#C9A84C" stroke="#8B6914" stroke-width="1"/>
        <rect x="70" y="10" width="7" height="7" rx="1" transform="rotate(-6 70 10)" fill="#C9A84C" stroke="#8B6914" stroke-width="1"/>
      </svg>
    </div>
    <h1 class="logo-name">DOMINATE</h1>
    <div class="logo-rule">
      <div class="logo-rule-line"></div>
      <div class="logo-rule-dot"></div>
      <div class="logo-rule-line"></div>
    </div>
  </div>

  <div class="card">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-custom" onclick="setMode('custom')">
        <span class="mode-btn-title">Custom</span>
        <span class="mode-btn-sub">Open lobby</span>
      </button>
      <button class="mode-btn" id="btn-ranked" onclick="setMode('ranked')">
        <span class="mode-btn-title">Ranked</span>
        <span class="mode-btn-sub">Competitive</span>
        <span class="ranked-badge">Season IV</span>
      </button>
    </div>

    <div class="field">
      <label>Commander name</label>
      <input type="text" id="username" placeholder="Enter your name…" maxlength="24" autocomplete="off">
    </div>

    <div class="field">
      <label>Map</label>
      <select id="map-select">
        <option value="world">World</option>
        <option value="europe">Europe</option>
        <option value="americas">Americas</option>
        <option value="asia">Asia</option>
        <option value="africa">Africa</option>
        <option value="pangaea">Pangaea</option>
      </select>
    </div>

    <div id="panel-custom">
      <div class="field">
        <label>Max players</label>
        <select id="player-count">
          <option>16 players</option>
          <option selected>32 players</option>
          <option>64 players</option>
          <option>128 players</option>
        </select>
      </div>
      <div class="field">
        <label>Lobby code <span style="font-weight:400;text-transform:none;letter-spacing:0;font-family:'EB Garamond',serif;font-size:12px;font-style:italic">— leave blank to create new</span></label>
        <input type="text" id="lobby-code" placeholder="e.g. CROWN·4821" maxlength="12" autocomplete="off" style="letter-spacing:0.12em;text-transform:uppercase;">
      </div>
    </div>

    <div id="panel-ranked" style="display:none;">
      <div class="field">
        <label>Queue size</label>
        <select id="queue-size">
          <option selected>32 players — balanced</option>
          <option>64 players — large scale</option>
        </select>
      </div>
      <div class="field">
        <label>Your rating</label>
        <input type="text" value="Gold III · 3,940 pts" readonly style="color:var(--gold);cursor:default;letter-spacing:0.05em;">
        <span class="field-hint">Matched with players within ±200 pts</span>
      </div>
    </div>

    <button class="submit-btn" onclick="handlePlay()" id="play-btn">
      Enter the field →
    </button>
  </div>

  <div class="live-strip">
    <div class="live-dot"></div>
    <span class="live-text"><span class="live-count" id="live-num">0</span> commanders online</span>
  </div>

  <ul class="footer-links">
    <li><a href="#">Leaderboard</a></li>
    <li><a href="#">Discord</a></li>
    <li><a href="#">Rules</a></li>
  </ul>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// ── WORLD MAP ──
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
let drawPending = false; // Flag to prevent overlapping draws

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (!drawPending) drawMap();
}

async function drawMap() {
  drawPending = true;
  const w = canvas.width, h = canvas.height;

  try {
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    
    // Clear canvas ONLY after JSON is ready to prevent flickering/ghosting
    ctx.clearRect(0, 0, w, h);

    const scaleValue = Math.max(w / 5.8, h / 3);
    const projection = d3.geoNaturalEarth1()
      .scale(scaleValue)
      .translate([w / 2, h / 2.1]);

    const path = d3.geoPath(projection, ctx);
    const countries = topojson.feature(world, world.objects.countries);
    const borders   = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
    const land      = topojson.merge(world, world.objects.countries.geometries);

    // Land fill
    ctx.beginPath();
    path(land);
    ctx.fillStyle = 'rgba(201, 168, 76, 0.05)';
    ctx.fill();

    // Country borders
    ctx.beginPath();
    path(borders);
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.15)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Outer coastline
    ctx.beginPath();
    path(land);
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.4)';
    ctx.lineWidth = 1.0;
    ctx.stroke();

    // Graticule
    const graticule = d3.geoGraticule()();
    ctx.beginPath();
    path(graticule);
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

  } catch(e) {
    console.warn('Map load failed', e);
  } finally {
    drawPending = false;
  }
}

window.addEventListener('resize', resize);
resize();

// ── UI LOGIC ──
let mode = 'custom';

function setMode(m) {
  mode = m;
  document.getElementById('btn-custom').classList.toggle('active', m === 'custom');
  document.getElementById('btn-ranked').classList.toggle('active', m === 'ranked');
  document.getElementById('panel-custom').style.display = m === 'custom' ? 'block' : 'none';
  document.getElementById('panel-ranked').style.display = m === 'ranked' ? 'block' : 'none';
  document.getElementById('play-btn').textContent = m === 'ranked' ? 'Join queue →' : 'Enter the field →';
}

function handlePlay() {
  const username = document.getElementById('username').value.trim();
  if (!username) {
    const inp = document.getElementById('username');
    inp.focus();
    inp.style.borderColor = 'rgba(201,168,76,0.7)';
    setTimeout(() => inp.style.borderColor = '', 1400);
    return;
  }
  console.log({ mode, username, map: document.getElementById('map-select').value });
}

// Animate live count
const el = document.getElementById('live-num');
let n = 0;
const iv = setInterval(() => {
  n = Math.min(n + 52, 2841);
  el.textContent = n.toLocaleString();
  if (n >= 2841) clearInterval(iv);
}, 16);
</script>
</body>
</html>
