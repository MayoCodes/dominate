<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOMINATE · Campaign</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E2C170;
    --black: #000000;
    --text: #EDE8DC;
    --text-muted: #6B6456;
    --red: #c94c4c;
    --green: #4caa6e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    overflow: hidden; touch-action: none; user-select: none;
  }

  #game-canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; background: #000; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; z-index: 500; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    transition: opacity 0.6s;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'Cinzel', serif; font-size: 28px; letter-spacing: 0.35em; color: var(--gold); }
  .loading-bar-wrap { width: 200px; height: 1px; background: rgba(201,168,76,0.15); }
  .loading-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s ease; }
  .loading-text { font-family: 'EB Garamond', serif; font-style: italic; font-size: 14px; color: var(--text-muted); }

  /* PLACEMENT OVERLAY */
  #placement-overlay {
    position: fixed; inset: 0; z-index: 200; pointer-events: none;
    display: none; flex-direction: column; align-items: center; padding-top: 68px;
  }
  #placement-banner {
    background: rgba(0,0,0,0.9); border: 1px solid rgba(201,168,76,0.35);
    padding: 14px 36px; text-align: center;
  }
  .placement-title {
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 6px;
  }
  .placement-sub { font-family: 'EB Garamond', serif; font-style: italic; font-size: 15px; color: var(--text-muted); }

  #timer-ring { margin-top: 18px; position: relative; width: 64px; height: 64px; }
  #timer-ring svg { width: 64px; height: 64px; transform: rotate(-90deg); }
  #timer-arc {
    fill: none; stroke: var(--gold); stroke-width: 2.5; stroke-linecap: butt;
    stroke-dasharray: 169.6; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  #timer-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--gold);
    transition: color 0.5s;
  }

  /* HUD TOP */
  #hud-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 52px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, transparent 100%);
    pointer-events: none;
  }
  .hud-logo { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.3em; color: var(--gold); }
  .hud-center { display: flex; align-items: center; gap: 10px; }
  .hud-pill {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-muted); border: 1px solid rgba(201,168,76,0.15); padding: 5px 12px;
    background: rgba(0,0,0,0.6);
  }
  .hud-pill span { color: var(--gold); }

  /* PHASE LABEL */
  #phase-label {
    position: fixed; top: 58px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-muted); background: rgba(0,0,0,0.7);
    border: 1px solid rgba(201,168,76,0.1); padding: 5px 16px; pointer-events: none;
    white-space: nowrap;
  }

  /* HUD BOTTOM */
  #hud-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 20px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
    pointer-events: none;
  }
  .self-card {
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.8); border: 1px solid rgba(201,168,76,0.2);
    padding: 10px 16px; pointer-events: auto;
  }
  .self-color-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
  .self-name { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.18em; color: var(--gold-light); }
  .self-stat { font-family: 'EB Garamond', serif; font-size: 14px; color: var(--text-muted); }
  .self-stat strong { color: var(--text); }

  /* SCOREBOARD */
  #scoreboard {
    background: rgba(0,0,0,0.8); border: 1px solid rgba(201,168,76,0.15);
    padding: 12px 16px; min-width: 180px; pointer-events: auto;
    max-height: 220px; overflow-y: auto;
  }
  .scoreboard-title { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block; }
  .score-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(201,168,76,0.06); }
  .score-row:last-child { border-bottom: none; }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .score-name { flex: 1; font-family: 'EB Garamond', serif; font-size: 14px; color: var(--text); }
  .score-val { font-family: 'Cinzel', serif; font-size: 9px; color: var(--text-muted); }

  /* ZOOM */
  #zoom-controls {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    z-index: 100; display: flex; flex-direction: column; gap: 4px;
  }
  .zoom-btn {
    width: 36px; height: 36px; background: rgba(0,0,0,0.8);
    border: 1px solid rgba(201,168,76,0.2); color: var(--gold);
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; font-family: 'Cinzel', serif;
  }
  .zoom-btn:hover { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.4); }

  /* MINIMAP */
  #minimap {
    position: fixed; bottom: 80px; right: 20px; z-index: 100;
    width: 150px; height: 84px; background: rgba(0,0,0,0.75);
    border: 1px solid rgba(201,168,76,0.15); overflow: hidden;
  }
  #minimap-canvas { width: 150px; height: 84px; display: block; }

  /* PLAYER TOOLTIP */
  #player-tooltip {
    position: fixed; z-index: 300; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; transform: translateX(-50%);
  }
  #player-tooltip.visible { opacity: 1; }
  .ptt-inner {
    background: rgba(4,4,4,0.97); border: 1px solid rgba(201,168,76,0.35);
    padding: 11px 15px; min-width: 145px; position: relative;
  }
  .ptt-inner::after {
    content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    border-top: 7px solid rgba(201,168,76,0.35);
  }
  .ptt-inner::before {
    content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    border-left: 6px solid transparent; border-right: 6px solid transparent;
    border-top: 6px solid rgba(4,4,4,0.97); z-index: 1;
  }
  .ptt-name { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.15em; color: var(--gold-light); display: block; margin-bottom: 7px; }
  .ptt-row { display: flex; justify-content: space-between; gap: 16px; font-family: 'EB Garamond', serif; font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .ptt-row strong { color: var(--text); }

  /* TOAST */
  #toast-container { position: fixed; top: 62px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; }
  .toast { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; padding: 8px 18px; border: 1px solid; backdrop-filter: blur(8px); animation: toastIn 0.3s ease both; }
  .toast.info    { border-color: rgba(201,168,76,0.4); color: var(--gold);  background: rgba(0,0,0,0.9); }
  .toast.success { border-color: rgba(76,170,110,0.4); color: var(--green); background: rgba(0,0,0,0.9); }
  .toast.error   { border-color: rgba(201,76,76,0.4);  color: var(--red);   background: rgba(0,0,0,0.9); }

  @keyframes toastIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">DOMINATE</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  <div class="loading-text" id="loading-text">Loading map data…</div>
</div>

<div id="toast-container"></div>
<canvas id="game-canvas"></canvas>

<div id="placement-overlay">
  <div id="placement-banner">
    <span class="placement-title">Choose your starting position</span>
    <span class="placement-sub">Click anywhere on land to place your base</span>
  </div>
  <div id="timer-ring">
    <svg viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="2"/>
      <circle id="timer-arc" cx="32" cy="32" r="27"/>
    </svg>
    <div id="timer-num">20</div>
  </div>
</div>

<div id="phase-label">Loading…</div>

<div id="hud-top">
  <div class="hud-logo">DOMINATE</div>
  <div class="hud-center">
    <div class="hud-pill">Turn <span id="hud-turn">1</span></div>
    <div class="hud-pill">Map · <span id="hud-map">World</span></div>
    <div class="hud-pill"><span id="hud-players">0</span> Commanders</div>
  </div>
  <div></div>
</div>

<div id="player-tooltip">
  <div class="ptt-inner">
    <span class="ptt-name" id="ptt-name">—</span>
    <div class="ptt-row"><span>Troops</span><strong id="ptt-troops">0</strong></div>
    <div class="ptt-row"><span>Territories</span><strong id="ptt-territories">0</strong></div>
  </div>
</div>

<div id="hud-bottom">
  <div class="self-card">
    <div class="self-color-dot" id="self-dot"></div>
    <div>
      <div class="self-name" id="self-name">Commander</div>
      <div class="self-stat">Territories: <strong id="self-territories">0</strong> · Troops: <strong id="self-troops">0</strong></div>
    </div>
  </div>
  <div id="scoreboard">
    <span class="scoreboard-title">Commanders</span>
    <div id="score-list"></div>
  </div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" onclick="zoomBy(1.2)">+</button>
  <button class="zoom-btn" onclick="zoomBy(0.83)">−</button>
  <button class="zoom-btn" onclick="resetZoom()" style="font-size:11px;">⌂</button>
</div>

<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const SERVER_WS = 'wss://dominate-server.maiyo-studios.workers.dev';
const PLACEMENT_SECS = 20;
const CIRC = 2 * Math.PI * 27; // ~169.6

const PLAYER_COLORS = [
  '#7EC8E3','#A8E6CF','#FFD3B6','#FF8B94','#C3B1E1',
  '#B5EAD7','#FFDAC1','#E2F0CB','#F7C5D5','#9FDBF3',
  '#D4A5F5','#FAD02E','#F9C784','#B8E0FF','#D5F5E3',
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let ws = null, myId = null, myColor = null, myName = '', roomCode = null, mapKey = 'world';
let players = {};       // id → { name, color, dot:[lon,lat]|null, territories:Set, troops }
let territories = {};   // countryId → playerId
let topoData = null, features = [], featureMap = {}, adjacency = {};
let phase = 'loading';
let timerLeft = PLACEMENT_SECS, timerInterval = null, myPlaced = false;
let transform = { x:0, y:0, k:1 };
let projection = null, pathGen = null, pathGenMM = null;
let pulseT = 0;
let pointers = {}, isDragging = false, dragStart = {x:0,y:0}, pinchStart = null;

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

// ══════════════════════════════════════════════
//  PARAMS
// ══════════════════════════════════════════════
function getParams() {
  const p = new URLSearchParams(location.search);
  return {
    room:     p.get('room')     || sessionStorage.getItem('roomCode') || 'TEST01',
    map:      p.get('map')      || sessionStorage.getItem('map')      || 'world',
    username: p.get('username') || sessionStorage.getItem('username') || 'Commander',
  };
}

// ══════════════════════════════════════════════
//  LOADING
// ══════════════════════════════════════════════
function setLoad(pct, text) {
  document.getElementById('loading-bar').style.width = pct + '%';
  document.getElementById('loading-text').textContent = text;
}
function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('fade');
  setTimeout(() => el.remove(), 700);
}

// ══════════════════════════════════════════════
//  RESIZE + PROJECTION
// ══════════════════════════════════════════════
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  mmCanvas.width = 150; mmCanvas.height = 84;
  if (topoData) buildProjection();
}
window.addEventListener('resize', resize);

function buildProjection() {
  const w = canvas.width, h = canvas.height;
  projection = d3.geoNaturalEarth1()
    .scale(Math.max(w / 5.8, h / 3))
    .translate([w / 2, h / 2.1]);
  pathGen = d3.geoPath(projection, ctx);
  const mmProj = d3.geoNaturalEarth1().scale(24).translate([75, 44]);
  pathGenMM = d3.geoPath(mmProj, mmCtx);
}

// ══════════════════════════════════════════════
//  LOAD MAP
// ══════════════════════════════════════════════
async function loadMap() {
  setLoad(20, 'Fetching map data…');
  const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  topoData = world;
  setLoad(55, 'Parsing territories…');
  features = topojson.feature(world, world.objects.countries).features;
  featureMap = {};
  features.forEach(f => { featureMap[+f.id] = f; });
  setLoad(72, 'Building adjacency…');
  buildAdjacency(world);
  setLoad(90, 'Preparing battlefield…');
  buildProjection(); resize();
  setLoad(100, 'Ready.');
  setTimeout(hideLoading, 350);
}

function buildAdjacency(world) {
  adjacency = {};
  features.forEach(f => { adjacency[+f.id] = new Set(); });
  topojson.mesh(world, world.objects.countries, (a, b) => {
    if (a !== b) {
      const aid = +a.id, bid = +b.id;
      if (!adjacency[aid]) adjacency[aid] = new Set();
      if (!adjacency[bid]) adjacency[bid] = new Set();
      adjacency[aid].add(bid);
      adjacency[bid].add(aid);
    }
    return false;
  });
}

// ══════════════════════════════════════════════
//  DRAW LOOP
// ══════════════════════════════════════════════
function startLoop() {
  (function loop(t) {
    pulseT = t;
    redraw();
    requestAnimationFrame(loop);
  })(0);
}

function redraw() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // Land + claimed colours
  features.forEach(f => {
    const id = +f.id, owner = territories[id];
    ctx.beginPath(); pathGen(f);
    ctx.fillStyle = owner && players[owner] ? players[owner].color + 'AA' : 'rgba(201,168,76,0.05)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(201,168,76,0.28)';
    ctx.lineWidth = 0.55 / transform.k;
    ctx.stroke();
  });

  // Highlight claimable (game phase)
  if (phase === 'game' && myId && players[myId]) {
    players[myId].territories.forEach(tid => {
      (adjacency[tid] || new Set()).forEach(adjId => {
        if (!territories[adjId] && featureMap[adjId]) {
          ctx.beginPath(); pathGen(featureMap[adjId]);
          ctx.strokeStyle = 'rgba(201,168,76,0.75)';
          ctx.lineWidth = 1.3 / transform.k; ctx.stroke();
          ctx.fillStyle = 'rgba(201,168,76,0.1)'; ctx.fill();
        }
      });
    });
  }

  // Graticule
  ctx.beginPath(); pathGen(d3.geoGraticule()());
  ctx.strokeStyle = 'rgba(201,168,76,0.04)';
  ctx.lineWidth = 0.4 / transform.k; ctx.stroke();

  // Player dots
  Object.entries(players).forEach(([id, p]) => {
    if (!p.dot) return;
    const [px, py] = projection(p.dot);
    const isMe = id === myId;
    const baseR = isMe ? 7 : 5.5;
    const pulse = Math.sin(pulseT / (isMe ? 280 : 450) + (parseInt(id, 16) || 0) * 0.1) * 2;
    const r = (baseR + pulse) / transform.k;

    // Glow
    const grd = ctx.createRadialGradient(px, py, 0, px, py, r * 3);
    grd.addColorStop(0, p.color + '55');
    grd.addColorStop(1, p.color + '00');
    ctx.beginPath(); ctx.arc(px, py, r * 3, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    // Core
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1 / transform.k; ctx.stroke();

    // Pulse ring (after placed)
    if (myPlaced || !isMe) {
      const ringR = (baseR + 5 + Math.sin(pulseT / 600) * 3) / transform.k;
      ctx.beginPath(); ctx.arc(px, py, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = p.color + '50';
      ctx.lineWidth = 1.2 / transform.k; ctx.stroke();
    }
  });

  ctx.restore();
  drawMinimap();
}

function drawMinimap() {
  mmCtx.clearRect(0, 0, 150, 84);
  mmCtx.fillStyle = '#000'; mmCtx.fillRect(0, 0, 150, 84);
  features.forEach(f => {
    const id = +f.id, owner = territories[id];
    mmCtx.beginPath(); pathGenMM(f);
    mmCtx.fillStyle = owner && players[owner] ? players[owner].color + '88' : 'rgba(201,168,76,0.06)';
    mmCtx.fill();
    mmCtx.strokeStyle = 'rgba(201,168,76,0.18)'; mmCtx.lineWidth = 0.3; mmCtx.stroke();
  });
  // dots
  const mmProj = pathGenMM.projection();
  Object.values(players).forEach(p => {
    if (!p.dot) return;
    const [px, py] = mmProj(p.dot);
    mmCtx.beginPath(); mmCtx.arc(px, py, 2.5, 0, Math.PI * 2);
    mmCtx.fillStyle = p.color; mmCtx.fill();
  });
  // viewport
  const vx = (-transform.x / transform.k) * (150 / canvas.width);
  const vy = (-transform.y / transform.k) * (84  / canvas.height);
  const vw = 150 / transform.k, vh = 84 / transform.k;
  mmCtx.strokeStyle = 'rgba(201,168,76,0.5)'; mmCtx.lineWidth = 1;
  mmCtx.strokeRect(vx, vy, vw, vh);
}

// ══════════════════════════════════════════════
//  HIT TESTS
// ══════════════════════════════════════════════
function featureAt(cx, cy) {
  for (const f of features) {
    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);
    ctx.beginPath(); pathGen(f);
    const hit = ctx.isPointInPath(cx, cy);
    ctx.restore();
    if (hit) return f;
  }
  return null;
}

function playerDotAt(cx, cy) {
  for (const [id, p] of Object.entries(players)) {
    if (!p.dot) continue;
    const [px, py] = projection(p.dot);
    const sx = px * transform.k + transform.x;
    const sy = py * transform.k + transform.y;
    if (Math.hypot(cx - sx, cy - sy) < 16) return id;
  }
  return null;
}

function screenToGeo(cx, cy) {
  return projection.invert([(cx - transform.x) / transform.k, (cy - transform.y) / transform.k]);
}

// ══════════════════════════════════════════════
//  ZOOM / PAN
// ══════════════════════════════════════════════
function applyZoom(factor, cx, cy) {
  const newK = Math.min(Math.max(transform.k * factor, 0.45), 22);
  transform.x = cx - (cx - transform.x) * (newK / transform.k);
  transform.y = cy - (cy - transform.y) * (newK / transform.k);
  transform.k = newK;
}
function zoomBy(f) { applyZoom(f, canvas.width/2, canvas.height/2); }
function resetZoom() { transform = {x:0,y:0,k:1}; }

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  applyZoom(e.deltaY < 0 ? 1.12 : 0.89, e.clientX, e.clientY);
}, { passive: false });

// ── UNIFIED POINTER EVENTS (mouse + touch + stylus) ──
canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const ids = Object.keys(pointers);
  if (ids.length === 1) {
    isDragging = false;
    dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
  } else if (ids.length === 2) {
    const [a, b] = ids.map(id => pointers[id]);
    pinchStart = {
      dist: Math.hypot(b.x - a.x, b.y - a.y),
      cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2,
      tx: transform.x, ty: transform.y, tk: transform.k,
    };
    isDragging = false;
  }
});

canvas.addEventListener('pointermove', e => {
  if (!pointers[e.pointerId]) return;
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const ids = Object.keys(pointers);

  if (ids.length >= 2 && pinchStart) {
    const [a, b] = ids.slice(0,2).map(id => pointers[id]);
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
    const scale = dist / pinchStart.dist;
    const newK = Math.min(Math.max(pinchStart.tk * scale, 0.45), 22);
    // Pan follows midpoint movement too
    const mdx = cx - pinchStart.cx, mdy = cy - pinchStart.cy;
    transform.x = pinchStart.tx * (newK / pinchStart.tk) + mdx + cx * (1 - newK / pinchStart.tk);
    transform.y = pinchStart.ty * (newK / pinchStart.tk) + mdy + cy * (1 - newK / pinchStart.tk);
    transform.k = newK;
    hidePlayerTooltip();
    return;
  }

  if (ids.length === 1) {
    const dx = e.clientX - (transform.x + dragStart.x);
    const dy = e.clientY - (transform.y + dragStart.y);
    if (!isDragging && Math.hypot(dx, dy) > 4) isDragging = true;
    if (isDragging) {
      transform.x = e.clientX - dragStart.x;
      transform.y = e.clientY - dragStart.y;
      hidePlayerTooltip();
      return;
    }
    // Hover — only player dots
    const pid = playerDotAt(e.clientX, e.clientY);
    if (pid && pid !== myId) {
      showPlayerTooltip(pid, e.clientX, e.clientY);
    } else {
      hidePlayerTooltip();
    }
  }
});

canvas.addEventListener('pointerup', e => {
  const count = Object.keys(pointers).length;
  const wasOne = count === 1;
  const wasDrag = isDragging;
  delete pointers[e.pointerId];
  if (Object.keys(pointers).length < 2) pinchStart = null;
  if (Object.keys(pointers).length === 0) isDragging = false;
  if (wasOne && !wasDrag) handleClick(e.clientX, e.clientY);
});

canvas.addEventListener('pointercancel', e => {
  delete pointers[e.pointerId];
  if (Object.keys(pointers).length < 2) pinchStart = null;
});

// ══════════════════════════════════════════════
//  CLICK HANDLER
// ══════════════════════════════════════════════
function handleClick(cx, cy) {
  if (phase === 'placement') {
    if (myPlaced) return;
    const f = featureAt(cx, cy);
    if (!f) { toast('Click on land to place your base', 'error', 2000); return; }
    const geo = screenToGeo(cx, cy);
    players[myId].dot = geo;
    myPlaced = true;
    send({ type: 'place_dot', geo, countryId: +f.id });
    toast('Base established!', 'success', 2000);

  } else if (phase === 'game') {
    const f = featureAt(cx, cy);
    if (!f) return;
    const id = +f.id;
    if (territories[id]) return; // already claimed
    const myTerr = players[myId]?.territories || new Set();
    let canClaim = false;
    myTerr.forEach(tid => { if ((adjacency[tid] || new Set()).has(id)) canClaim = true; });
    if (!canClaim) { toast('Expand from your existing territory', 'error', 1800); return; }
    send({ type: 'claim_territory', territory: id });
  }
}

// ══════════════════════════════════════════════
//  PLACEMENT TIMER
// ══════════════════════════════════════════════
function startPlacementTimer() {
  phase = 'placement';
  timerLeft = PLACEMENT_SECS;
  document.getElementById('placement-overlay').style.display = 'flex';
  document.getElementById('phase-label').textContent = 'Placement Phase — click land to drop your base';
  updateTimerArc(timerLeft);

  timerInterval = setInterval(() => {
    timerLeft--;
    document.getElementById('timer-num').textContent = timerLeft;
    updateTimerArc(timerLeft);
    if (timerLeft <= 0) { clearInterval(timerInterval); endPlacement(); }
  }, 1000);
}

function updateTimerArc(t) {
  const frac = t / PLACEMENT_SECS;
  document.getElementById('timer-arc').style.strokeDashoffset = CIRC * (1 - frac);
  const urgent = t <= 5;
  document.getElementById('timer-arc').style.stroke = urgent ? '#c94c4c' : 'var(--gold)';
  document.getElementById('timer-num').style.color  = urgent ? '#c94c4c' : 'var(--gold)';
}

function endPlacement() {
  if (!myPlaced && myId) {
    const f = features[Math.floor(Math.random() * features.length)];
    const geo = d3.geoCentroid(f);
    players[myId].dot = geo;
    myPlaced = true;
    send({ type: 'place_dot', geo, countryId: +f.id });
    toast('Base placed randomly', 'info', 2500);
  }
  document.getElementById('placement-overlay').style.display = 'none';
  document.getElementById('phase-label').textContent = 'Campaign — click gold-bordered territories to expand';
  phase = 'game';
  toast('Expand your empire!', 'success', 3000);
}

// ══════════════════════════════════════════════
//  PLAYER TOOLTIP
// ══════════════════════════════════════════════
const ptt = document.getElementById('player-tooltip');
function showPlayerTooltip(id, cx, cy) {
  const p = players[id]; if (!p) return;
  document.getElementById('ptt-name').textContent        = p.name;
  document.getElementById('ptt-troops').textContent      = p.troops || 0;
  document.getElementById('ptt-territories').textContent = p.territories.size;
  ptt.style.left = cx + 'px';
  ptt.style.top  = (cy - 105) + 'px';
  ptt.classList.add('visible');
}
function hidePlayerTooltip() { ptt.classList.remove('visible'); }

// ══════════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════════
function connectWS(code, username) {
  ws = new WebSocket(`${SERVER_WS}/room/${code}`);
  ws.addEventListener('open', () => {
    send({ type: 'join', username, isHost: false, settings: { map: mapKey } });
  });
  ws.addEventListener('message', e => {
    try { handleMsg(JSON.parse(e.data)); } catch(err) { console.warn(err); }
  });
  ws.addEventListener('close', () => toast('Disconnected', 'error'));
  ws.addEventListener('error', () => toast('Connection error', 'error'));
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'welcome':
      myId = msg.id;
      myColor = PLAYER_COLORS[Object.keys(players).length % PLAYER_COLORS.length];
      if (!players[myId]) players[myId] = { name: myName, color: myColor, dot: null, territories: new Set(), troops: 10 };
      updateSelfCard();
      startPlacementTimer();
      break;

    case 'playerList':
      msg.players.forEach((p, i) => {
        if (!players[p.id]) players[p.id] = { name: p.name, color: PLAYER_COLORS[i % PLAYER_COLORS.length], dot: null, territories: new Set(), troops: 10 };
      });
      updateScoreboard(); updateHUD(); break;

    case 'playerJoined':
      if (!players[msg.player.id]) {
        const idx = Object.keys(players).length;
        players[msg.player.id] = { name: msg.player.name, color: PLAYER_COLORS[idx % PLAYER_COLORS.length], dot: null, territories: new Set(), troops: 10 };
        toast(`${msg.player.name} joined`, 'info');
        updateScoreboard(); updateHUD();
      }
      break;

    case 'playerLeft':
      if (players[msg.id]) { toast(`${players[msg.id].name} left`, 'info'); delete players[msg.id]; updateScoreboard(); updateHUD(); }
      break;

    case 'territory_claimed':
      claimTerritory(msg.territory, msg.playerId); break;

    case 'turn_change':
      document.getElementById('hud-turn').textContent = msg.turn + 1; break;

    case 'pong': break;

    default:
      // Server broadcasts place_dot from other players
      if (msg.from && msg.geo && players[msg.from]) {
        players[msg.from].dot = msg.geo;
      }
  }
}

function claimTerritory(id, playerId) {
  const prev = territories[id];
  if (prev && players[prev]) players[prev].territories.delete(+id);
  territories[id] = playerId;
  if (players[playerId]) players[playerId].territories.add(+id);
  updateScoreboard(); updateSelfCard();
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateSelfCard() {
  const me = players[myId]; if (!me) return;
  document.getElementById('self-name').textContent        = me.name;
  document.getElementById('self-territories').textContent = me.territories.size;
  document.getElementById('self-troops').textContent      = me.troops || 0;
  document.getElementById('self-dot').style.background    = me.color;
}
function updateScoreboard() {
  const list = document.getElementById('score-list');
  list.innerHTML = '';
  Object.entries(players)
    .sort((a,b) => b[1].territories.size - a[1].territories.size)
    .forEach(([id, p]) => {
      const row = document.createElement('div');
      row.className = 'score-row';
      row.innerHTML = `<div class="score-dot" style="background:${p.color}"></div><span class="score-name">${escHtml(p.name)}${id===myId?' <span style="color:var(--text-muted);font-size:11px">(you)</span>':''}</span><span class="score-val">${p.territories.size}</span>`;
      list.appendChild(row);
    });
}
function updateHUD() {
  document.getElementById('hud-players').textContent = Object.keys(players).length;
  document.getElementById('hud-map').textContent = mapKey.charAt(0).toUpperCase() + mapKey.slice(1);
}

// ══════════════════════════════════════════════
//  UTIL
// ══════════════════════════════════════════════
function toast(msg, type='info', dur=3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), dur);
}
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) send({ type:'ping', t:Date.now() }); }, 15000);

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
async function boot() {
  const params = getParams();
  roomCode = params.room; mapKey = params.map; myName = params.username;
  document.getElementById('hud-map').textContent = mapKey.charAt(0).toUpperCase() + mapKey.slice(1);
  resize();
  await loadMap();
  startLoop();
  connectWS(roomCode, myName);
}
boot();
</script>
