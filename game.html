<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOMINATE · Campaign</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E2C170;
    --black: #000000;
    --text: #EDE8DC;
    --text-muted: #6B6456;
    --red: #c94c4c;
    --green: #4caa6e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    overflow: hidden; touch-action: none; user-select: none;
  }

  #game-canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; background: #000; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; z-index: 500; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    transition: opacity 0.6s;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'Cinzel', serif; font-size: 28px; letter-spacing: 0.35em; color: var(--gold); }
  .loading-bar-wrap { width: 200px; height: 1px; background: rgba(201,168,76,0.15); }
  .loading-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s ease; }
  .loading-text { font-family: 'EB Garamond', serif; font-style: italic; font-size: 14px; color: var(--text-muted); }

  /* PLACEMENT OVERLAY */
  #placement-overlay {
    position: fixed; inset: 0; z-index: 200; pointer-events: none;
    display: none; flex-direction: column; align-items: center; padding-top: 68px;
  }
  #placement-banner {
    background: rgba(0,0,0,0.9); border: 1px solid rgba(201,168,76,0.35);
    padding: 14px 36px; text-align: center;
  }
  .placement-title {
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 6px;
  }
  .placement-sub { font-family: 'EB Garamond', serif; font-style: italic; font-size: 15px; color: var(--text-muted); }

  #timer-ring { margin-top: 18px; position: relative; width: 64px; height: 64px; }
  #timer-ring svg { width: 64px; height: 64px; transform: rotate(-90deg); }
  #timer-arc {
    fill: none; stroke: var(--gold); stroke-width: 2.5; stroke-linecap: butt;
    stroke-dasharray: 169.6; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  #timer-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--gold);
    transition: color 0.5s;
  }

  /* HUD TOP */
  #hud-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 52px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, transparent 100%);
    pointer-events: none;
  }
  .hud-logo { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.3em; color: var(--gold); }
  .hud-center { display: flex; align-items: center; gap: 10px; }
  .hud-pill {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-muted); border: 1px solid rgba(201,168,76,0.15); padding: 5px 12px;
    background: rgba(0,0,0,0.6);
  }
  .hud-pill span { color: var(--gold); }

  /* PHASE LABEL */
  #phase-label {
    position: fixed; top: 58px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-muted); background: rgba(0,0,0,0.7);
    border: 1px solid rgba(201,168,76,0.1); padding: 5px 16px; pointer-events: none;
    white-space: nowrap;
  }

  /* HUD BOTTOM */
  #hud-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 20px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
    pointer-events: none;
  }

  /* SELF CARD with sliders */
  .self-card {
    display: flex; flex-direction: column; gap: 8px;
    background: rgba(0,0,0,0.85); border: 1px solid rgba(201,168,76,0.2);
    padding: 12px 16px; pointer-events: auto; min-width: 260px;
  }
  .self-top { display: flex; align-items: center; gap: 12px; }
  .self-color-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
  .self-name { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.18em; color: var(--gold-light); }
  .self-stat { font-family: 'EB Garamond', serif; font-size: 13px; color: var(--text-muted); }
  .self-stat strong { color: var(--text); }

  /* SLIDERS */
  .slider-row { display: flex; flex-direction: column; gap: 4px; }
  .slider-label {
    font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-muted); display: flex; justify-content: space-between;
  }
  .slider-label span { color: var(--gold); }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 2px;
    background: rgba(201,168,76,0.2); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: var(--gold); border: 1px solid rgba(255,255,255,0.4);
  }
  input[type=range].attack-slider::-webkit-slider-thumb { background: var(--red); }

  /* ATTACK BUTTON */
  #attack-btn {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    padding: 7px 14px; border: 1px solid rgba(201,76,76,0.3); color: var(--text-muted);
    background: rgba(0,0,0,0.4); cursor: default; width: 100%;
  }
  #attack-btn.active {
    border-color: rgba(201,76,76,0.7); color: var(--red);
    background: rgba(201,76,76,0.08);
  }

  /* TROOP BAR */
  .troop-bar-wrap { width: 100%; height: 3px; background: rgba(201,168,76,0.1); border-radius: 2px; overflow: hidden; }
  .troop-bar { height: 100%; background: var(--gold); transition: width 0.3s; border-radius: 2px; }
  .troop-bar.near-max { background: var(--green); }
  .troop-bar.optimal { background: var(--gold); }
  .troop-bar.low { background: var(--red); }

  /* ATTACK PROGRESS */
  .attack-prog-wrap { width: 100%; height: 2px; background: rgba(201,76,76,0.1); border-radius: 2px; overflow: hidden; display: none; }
  .attack-prog { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.15s; }

  /* SCOREBOARD */
  #scoreboard {
    background: rgba(0,0,0,0.8); border: 1px solid rgba(201,168,76,0.15);
    padding: 12px 16px; min-width: 180px; pointer-events: auto;
    max-height: 240px; overflow-y: auto;
  }
  .scoreboard-title { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block; }
  .score-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(201,168,76,0.06); }
  .score-row:last-child { border-bottom: none; }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .score-name { flex: 1; font-family: 'EB Garamond', serif; font-size: 14px; color: var(--text); }
  .score-val { font-family: 'Cinzel', serif; font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; }

  /* ZOOM */
  #zoom-controls {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    z-index: 100; display: flex; flex-direction: column; gap: 4px;
  }
  .zoom-btn {
    width: 36px; height: 36px; background: rgba(0,0,0,0.8);
    border: 1px solid rgba(201,168,76,0.2); color: var(--gold);
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; font-family: 'Cinzel', serif;
  }
  .zoom-btn:hover { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.4); }

  /* MINIMAP */
  #minimap {
    position: fixed; bottom: 80px; right: 20px; z-index: 100;
    width: 150px; height: 84px; background: rgba(0,0,0,0.75);
    border: 1px solid rgba(201,168,76,0.15); overflow: hidden;
  }
  #minimap-canvas { width: 150px; height: 84px; display: block; }

  /* PLAYER TOOLTIP */
  #player-tooltip {
    position: fixed; z-index: 300; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; transform: translateX(-50%);
  }
  #player-tooltip.visible { opacity: 1; }
  .ptt-inner {
    background: rgba(4,4,4,0.97); border: 1px solid rgba(201,168,76,0.35);
    padding: 11px 15px; min-width: 160px; position: relative;
  }
  .ptt-inner::after {
    content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    border-top: 7px solid rgba(201,168,76,0.35);
  }
  .ptt-inner::before {
    content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    border-left: 6px solid transparent; border-right: 6px solid transparent;
    border-top: 6px solid rgba(4,4,4,0.97); z-index: 1;
  }
  .ptt-name { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.15em; color: var(--gold-light); display: block; margin-bottom: 7px; }
  .ptt-row { display: flex; justify-content: space-between; gap: 16px; font-family: 'EB Garamond', serif; font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .ptt-row strong { color: var(--text); }

  /* TOAST */
  #toast-container { position: fixed; top: 62px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; }
  .toast { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; padding: 8px 18px; border: 1px solid; backdrop-filter: blur(8px); animation: toastIn 0.3s ease both; }
  .toast.info    { border-color: rgba(201,168,76,0.4); color: var(--gold);  background: rgba(0,0,0,0.9); }
  .toast.success { border-color: rgba(76,170,110,0.4); color: var(--green); background: rgba(0,0,0,0.9); }
  .toast.error   { border-color: rgba(201,76,76,0.4);  color: var(--red);   background: rgba(0,0,0,0.9); }

  @keyframes toastIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  /* VICTORY OVERLAY */
  #victory-overlay {
    position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.92);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  }
  #victory-overlay.show { display: flex; }
  .victory-title { font-family: 'Cinzel', serif; font-size: 42px; letter-spacing: 0.3em; color: var(--gold); }
  .victory-sub { font-family: 'EB Garamond', serif; font-style: italic; font-size: 20px; color: var(--text-muted); }
  .victory-btn {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
    padding: 12px 32px; border: 1px solid rgba(201,168,76,0.5); color: var(--gold);
    background: rgba(201,168,76,0.08); cursor: pointer; margin-top: 10px;
    transition: background 0.2s;
  }
  .victory-btn:hover { background: rgba(201,168,76,0.18); }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">DOMINATE</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  <div class="loading-text" id="loading-text">Loading map data…</div>
</div>

<div id="toast-container"></div>
<canvas id="game-canvas"></canvas>

<div id="placement-overlay">
  <div id="placement-banner">
    <span class="placement-title">Choose your starting position</span>
    <span class="placement-sub">Click anywhere on land to place your base</span>
  </div>
  <div id="timer-ring">
    <svg viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="2"/>
      <circle id="timer-arc" cx="32" cy="32" r="27"/>
    </svg>
    <div id="timer-num">20</div>
  </div>
</div>

<div id="phase-label">Loading…</div>

<div id="hud-top">
  <div class="hud-logo">DOMINATE</div>
  <div class="hud-center">
    <div class="hud-pill">Tick <span id="hud-turn">0</span></div>
    <div class="hud-pill">Map · <span id="hud-map">World</span></div>
    <div class="hud-pill"><span id="hud-players">0</span> Commanders</div>
    <div class="hud-pill">Gold <span id="hud-gold">0</span></div>
  </div>
  <div></div>
</div>

<div id="player-tooltip">
  <div class="ptt-inner">
    <span class="ptt-name" id="ptt-name">—</span>
    <div class="ptt-row"><span>Troops</span><strong id="ptt-troops">0</strong></div>
    <div class="ptt-row"><span>Tiles</span><strong id="ptt-territories">0</strong></div>
    <div class="ptt-row"><span>Land %</span><strong id="ptt-pct">0%</strong></div>
  </div>
</div>

<div id="hud-bottom">
  <div class="self-card">
    <div class="self-top">
      <div class="self-color-dot" id="self-dot"></div>
      <div style="flex:1">
        <div class="self-name" id="self-name">Commander</div>
        <div class="self-stat">
          Troops: <strong id="self-troops">0</strong>/<strong id="self-max">1000</strong>
          · Tiles: <strong id="self-territories">0</strong>
        </div>
      </div>
    </div>

    <div class="troop-bar-wrap">
      <div class="troop-bar" id="troop-bar" style="width:5%"></div>
    </div>

    <!-- Attack progress bar (visible during expansion) -->
    <div class="attack-prog-wrap" id="attack-prog-wrap">
      <div class="attack-prog" id="attack-prog" style="width:0%"></div>
    </div>

    <div class="slider-row">
      <div class="slider-label">Workers <span id="worker-pct">20%</span></div>
      <input type="range" id="worker-slider" min="0" max="100" value="20"
        oninput="onWorkerSlider(this.value)">
    </div>

    <div class="slider-row">
      <div class="slider-label">Attack Ratio <span id="attack-pct">50%</span></div>
      <input type="range" class="attack-slider" id="attack-slider" min="1" max="100" value="50"
        oninput="onAttackSlider(this.value)">
    </div>

    <button id="attack-btn" onclick="cancelAttack()">Click territory to expand</button>
  </div>

  <div id="scoreboard">
    <span class="scoreboard-title">Commanders</span>
    <div id="score-list"></div>
  </div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" onclick="zoomBy(1.2)">+</button>
  <button class="zoom-btn" onclick="zoomBy(0.83)">−</button>
  <button class="zoom-btn" onclick="resetZoom()" style="font-size:11px;">⌂</button>
</div>

<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<div id="victory-overlay">
  <div class="victory-title">DOMINION</div>
  <div class="victory-sub" id="victory-sub">Victory achieved</div>
  <button class="victory-btn" onclick="location.reload()">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const SERVER_WS      = 'wss://dominate-server.maiyo-studios.workers.dev';
const PLACEMENT_SECS = 20;
const CIRC           = 2 * Math.PI * 27;
const WIN_PCT        = 0.80;

const PLAYER_COLORS = [
  '#7EC8E3','#A8E6CF','#FFD3B6','#FF8B94','#C3B1E1',
  '#B5EAD7','#FFDAC1','#E2F0CB','#F7C5D5','#9FDBF3',
  '#D4A5F5','#FAD02E','#F9C784','#B8E0FF','#D5F5E3',
];

// ══════════════════════════════════════════════
//  PIXEL GRID  — this IS the game world
// ══════════════════════════════════════════════
const GRID_W = 1200, GRID_H = 600;
let gridLand  = null;  // Uint8Array  [GRID_W*GRID_H]  1=land 0=water
let gridOwner = null;  // Uint32Array [GRID_W*GRID_H]  0=unclaimed, else playerIdx

let gridProj = null;
let gridScale = 1;

let playerIdx  = {};
let idxPlayer  = {};
let nextIdx    = 1;

let pidxRgb = {};

// ══════════════════════════════════════════════
//  SERVER / COUNTRY-LEVEL STATE
// ══════════════════════════════════════════════
let ws = null, myId = null, myColor = null, myName = '', roomCode = null, mapKey = 'world';

let players = {};
let territories = {};
let activeAttacks = new Map();
let tileCounts    = {};
let landTileTotal = 0;

let topoData = null, features = [], featureMap = {}, adjacency = {};
let cellCountry = null;

let phase = 'loading';
let timerLeft = PLACEMENT_SECS, timerInterval = null, myPlaced = false;
let transform = { x:0, y:0, k:1 };
let projection = null, pathGen = null, pathGenMM = null;
let pulseT = 0;
let pointers = {}, isDragging = false, dragStart = {x:0,y:0}, pinchStart = null;

let workerRatio = 0.20;
let attackRatio = 0.50;

const canvas   = document.getElementById('game-canvas');
const ctx      = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx    = mmCanvas.getContext('2d');

// ══════════════════════════════════════════════
//  PARAMS
// ══════════════════════════════════════════════
function getParams() {
  const p = new URLSearchParams(location.search);
  return {
    room:     p.get('room')     || sessionStorage.getItem('roomCode') || 'TEST01',
    map:      p.get('map')      || sessionStorage.getItem('map')      || 'world',
    username: p.get('username') || sessionStorage.getItem('username') || 'Commander',
  };
}

// ══════════════════════════════════════════════
//  LOADING
// ══════════════════════════════════════════════
function setLoad(pct, text) {
  document.getElementById('loading-bar').style.width = pct + '%';
  document.getElementById('loading-text').textContent = text;
}
function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('fade');
  setTimeout(() => el.remove(), 700);
}

// ══════════════════════════════════════════════
//  RESIZE + PROJECTION
// ══════════════════════════════════════════════
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  mmCanvas.width = 150; mmCanvas.height = 84;
  if (topoData) buildProjection();
}
window.addEventListener('resize', resize);

function buildProjection() {
  const w = canvas.width, h = canvas.height;

  projection = d3.geoNaturalEarth1()
    .scale(Math.max(w / 5.8, h / 3))
    .translate([w / 2, h / 2.1]);
  pathGen = d3.geoPath(projection, ctx);

  const canvasScale = Math.max(w / 5.8, h / 3);
  gridProj = d3.geoNaturalEarth1()
    .scale(canvasScale * GRID_W / w)
    .translate([GRID_W / 2, GRID_H / 2.1]);

  const mmProj = d3.geoNaturalEarth1().scale(24).translate([75, 44]);
  pathGenMM = d3.geoPath(mmProj, mmCtx);
}

// ══════════════════════════════════════════════
//  LOAD MAP
// ══════════════════════════════════════════════
async function loadMap() {
  setLoad(20, 'Fetching map data…');
  const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  topoData = world;

  setLoad(40, 'Parsing territories…');
  features = topojson.feature(world, world.objects.countries).features;
  featureMap = {};
  features.forEach(f => { featureMap[+f.id] = f; });
  buildProjection(); resize();

  setLoad(55, 'Rasterizing pixel grid…');
  rasterizeGrid();

  setLoad(72, 'Building country cell map…');
  buildCellCountryMap();

  setLoad(85, 'Building adjacency…');
  buildAdjacency(world);

  setLoad(100, 'Ready.');
  setTimeout(hideLoading, 350);
}

function rasterizeGrid() {
  const off = document.createElement('canvas');
  off.width = GRID_W; off.height = GRID_H;
  const oc  = off.getContext('2d', { willReadFrequently: true });

  const gPath = d3.geoPath(gridProj, oc);

  oc.fillStyle = '#000'; oc.fillRect(0, 0, GRID_W, GRID_H);
  oc.fillStyle = '#fff';
  features.forEach(f => { oc.beginPath(); gPath(f); oc.fill(); });

  const data = oc.getImageData(0, 0, GRID_W, GRID_H).data;
  gridLand  = new Uint8Array(GRID_W * GRID_H);
  gridOwner = new Uint32Array(GRID_W * GRID_H);

  for (let i = 0; i < GRID_W * GRID_H; i++) {
    gridLand[i] = data[i * 4] > 128 ? 1 : 0;
  }
  landTileTotal = 0;
  for (let i = 0; i < gridLand.length; i++) if (gridLand[i]) landTileTotal++;
  console.log('[GRID] rasterized', GRID_W * GRID_H, 'tiles,', landTileTotal, 'land');
}

function buildCellCountryMap() {
  const off = document.createElement('canvas');
  off.width = GRID_W; off.height = GRID_H;
  const oc  = off.getContext('2d', { willReadFrequently: true });

  const gPath = d3.geoPath(gridProj, oc);

  oc.fillStyle = '#000'; oc.fillRect(0, 0, GRID_W, GRID_H);
  features.forEach((f, i) => {
    const n = i + 1;
    oc.fillStyle = `rgb(${(n >> 16) & 0xff},${(n >> 8) & 0xff},${n & 0xff})`;
    oc.beginPath(); gPath(f); oc.fill();
  });

  const data = oc.getImageData(0, 0, GRID_W, GRID_H).data;
  cellCountry = new Uint16Array(GRID_W * GRID_H);
  for (let i = 0; i < GRID_W * GRID_H; i++) {
    const n = (data[i*4] << 16) | (data[i*4+1] << 8) | data[i*4+2];
    if (n === 0) continue;
    const fi = n - 1;
    if (fi < features.length) cellCountry[i] = +features[fi].id;
  }
}

function buildAdjacency(world) {
  adjacency = {};
  features.forEach(f => { adjacency[+f.id] = new Set(); });
  topojson.mesh(world, world.objects.countries, (a, b) => {
    if (a !== b) {
      const aid = +a.id, bid = +b.id;
      adjacency[aid] = adjacency[aid] || new Set();
      adjacency[bid] = adjacency[bid] || new Set();
      adjacency[aid].add(bid);
      adjacency[bid].add(aid);
    }
    return false;
  });
}

function cellToCountry(idx) {
  if (!cellCountry) return null;
  return cellCountry[idx] || null;
}

// ══════════════════════════════════════════════
//  GRID HELPERS
// ══════════════════════════════════════════════
function screenToCell(sx, sy) {
  if (!projection || !gridProj) return -1;
  const screenPt = [(sx - transform.x) / transform.k, (sy - transform.y) / transform.k];
  const geo = projection.invert(screenPt);
  if (!geo) return -1;
  const [gx0, gy0] = gridProj(geo);
  const gx = Math.floor(gx0), gy = Math.floor(gy0);
  if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return -1;
  return gy * GRID_W + gx;
}

function cellToScreen(idx) {
  if (!gridProj || !projection) return [0,0];
  const gx = idx % GRID_W, gy = Math.floor(idx / GRID_W);
  const geo = gridProj.invert([gx + 0.5, gy + 0.5]);
  if (!geo) return [0,0];
  const [sx, sy] = projection(geo);
  return [sx * transform.k + transform.x, sy * transform.k + transform.y];
}

function cellNeighbors(idx) {
  const x = idx % GRID_W, y = Math.floor(idx / GRID_W);
  const out = [];
  if (x > 0)          out.push(idx - 1);
  if (x < GRID_W - 1) out.push(idx + 1);
  if (y > 0)          out.push(idx - GRID_W);
  if (y < GRID_H - 1) out.push(idx + GRID_W);
  return out;
}

function getPlayerIdx(pid) {
  if (!(pid in playerIdx)) {
    playerIdx[pid] = nextIdx;
    idxPlayer[nextIdx] = pid;
    nextIdx++;
    pidxRgb[playerIdx[pid]] = null;
  }
  return playerIdx[pid];
}

function getPidxRgb(pidx) {
  if (pidxRgb[pidx]) return pidxRgb[pidx];
  const pid = idxPlayer[pidx];
  if (!pid || !players[pid]) return null;
  const c = players[pid].color;
  pidxRgb[pidx] = [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)];
  return pidxRgb[pidx];
}

function claimTile(idx, pid) {
  const prevPidx = gridOwner[idx];
  const newPidx  = getPlayerIdx(pid);
  if (prevPidx === newPidx) return;
  if (prevPidx) {
    const prevPid = idxPlayer[prevPidx];
    if (prevPid) tileCounts[prevPid] = (tileCounts[prevPid] || 1) - 1;
  }
  gridOwner[idx] = newPidx;
  tileCounts[pid] = (tileCounts[pid] || 0) + 1;
}

function seedPlayerTiles(startIdx, pid, radius) {
  const pidx = getPlayerIdx(pid);
  const visited = new Set([startIdx]);
  const queue   = [startIdx];
  let claimed   = 0;
  const target  = Math.PI * radius * radius | 0;
  while (queue.length > 0 && claimed < target) {
    const idx = queue.splice(Math.floor(Math.random() * Math.min(queue.length, 4)), 1)[0];
    if (gridLand[idx] && gridOwner[idx] !== pidx) {
      const prevPidx = gridOwner[idx];
      if (prevPidx) {
        const prevPid = idxPlayer[prevPidx];
        if (prevPid) tileCounts[prevPid] = (tileCounts[prevPid] || 1) - 1;
      }
      gridOwner[idx] = pidx;
      tileCounts[pid] = (tileCounts[pid] || 0) + 1;
      claimed++;
    }
    for (const n of cellNeighbors(idx)) {
      if (!visited.has(n)) {
        visited.add(n);
        queue.push(n);
      }
    }
  }
}

function countMyTiles() {
  if (!myId) return 0;
  const pidx = playerIdx[myId];
  if (!pidx) return 0;
  let n = 0;
  for (let i = 0; i < gridOwner.length; i++) if (gridOwner[i] === pidx) n++;
  return n;
}

// ══════════════════════════════════════════════════════════════
//  ATTACK EXECUTION  — OpenFrontIO-style expansion engine
//
//  Key design principles mirroring OpenFrontIO:
//  1. Troops are COMMITTED up front (attackRatio × current troops)
//  2. Each tile costs troop_loss based on defender shield / tile density
//  3. Speed (tiles/tick) scales with committed troop count
//  4. Frontier is a priority queue sorted by dist-to-target + jitter
//  5. Attack stops when committed troops are exhausted OR target reached
//  6. BFS path-check before committing (no attacking across ocean)
// ══════════════════════════════════════════════════════════════

const TERRAIN_LOSS = {
  // Each tile conquered costs this many committed troops
  BASE_LAND:      0.4,   // open land / wilderness
  ENEMY_LAND:     1.0,   // enemy-owned tile (defender shield effect)
};

// How many committed troops are needed to conquer one enemy tile.
// Mirrors: defenderLoss = defenderTroops / defenderTilesOwned
// Attacker loses: 0.8 * terrainDef * clampedTroopRatio
const ATTRITION_PER_TILE = 0.8;  // base multiplier on committed troop spend

// Tiles processed per tick — scales with committed troop mass
// speed = max(1, committedTroops / SPEED_DIVISOR)
// mirrors OpenFrontIO's "speed" = terrainSpeed * largeBuff
const SPEED_DIVISOR = 40;
const SPEED_MIN     = 1;
const SPEED_MAX     = 120;

// Tick interval in ms — matches OpenFrontIO's ~60ms game tick
const TICK_MS = 60;

// Frontier jitter so expansion looks organic, not perfectly circular
const FRONTIER_JITTER = 6;

let atkState = null;  // null = no attack running

/*
  atkState = {
    targetIdx:      int,        // destination cell
    targetX/Y:      int,        // grid coords of target for distance sort
    committedTroops: float,     // troops locked into this attack
    spentTroops:    float,      // troops consumed so far
    frontier:       Int32Array, // sorted candidate tiles
    frontierLen:    int,
    visited:        Uint8Array,
    interval:       id,
    tilesConquered: int,
    startTiles:     int,        // total tiles at attack start (for progress bar)
  }
*/

function cancelAttack() {
  if (!atkState) return;
  clearInterval(atkState.interval);
  atkState = null;
  document.getElementById('attack-prog-wrap').style.display = 'none';
  document.getElementById('attack-btn').textContent = 'Click territory to expand';
  document.getElementById('attack-btn').classList.remove('active');
}

// Quick BFS reachability check (same as before, needed before committing troops)
function canReachTarget(targetIdx) {
  const myPidx = playerIdx[myId];
  if (!myPidx) return false;
  const size   = GRID_W * GRID_H;
  const visited = new Uint8Array(size);
  const queue  = [];

  // Seed queue with all my border tiles adjacent to non-mine land
  for (let i = 0; i < size; i++) {
    if (gridOwner[i] !== myPidx) continue;
    for (const n of cellNeighbors(i)) {
      if (gridLand[n] && gridOwner[n] !== myPidx && !visited[n]) {
        visited[n] = 1;
        queue.push(n);
      }
    }
  }

  let head = 0;
  while (head < queue.length) {
    const cur = queue[head++];
    if (cur === targetIdx) return true;
    for (const n of cellNeighbors(cur)) {
      if (!visited[n] && gridLand[n]) {
        visited[n] = 1;
        queue.push(n);
      }
    }
  }
  return false;
}

function startAttack(targetIdx) {
  cancelAttack();

  if (!gridLand[targetIdx]) {
    toast('Cannot expand into ocean', 'error', 1800);
    return;
  }
  const myPidx = getPlayerIdx(myId);
  if (gridOwner[targetIdx] === myPidx) return;

  // ── Reachability check ───────────────────────────────────────
  if (!canReachTarget(targetIdx)) {
    toast('Unreachable — separated by water', 'error', 1800);
    return;
  }

  // ── Commit troops (OpenFrontIO: player sets attackRatio) ─────
  const me = players[myId];
  if (!me || me.troops <= 0) {
    toast('Not enough troops', 'error', 1800);
    return;
  }

  const committed = Math.max(1, Math.floor(me.troops * attackRatio));
  // Deduct immediately — troops are "in the field"
  me.troops -= committed;
  updateSelfCard();

  const tx = targetIdx % GRID_W;
  const ty = Math.floor(targetIdx / GRID_W);

  // ── Build initial frontier from all border tiles ─────────────
  const size    = GRID_W * GRID_H;
  const visited = new Uint8Array(size);
  const initialFrontier = [];

  for (let i = 0; i < size; i++) {
    if (gridOwner[i] !== myPidx) continue;
    for (const n of cellNeighbors(i)) {
      if (gridLand[n] && gridOwner[n] !== myPidx && !visited[n]) {
        visited[n] = 1;
        initialFrontier.push(n);
      }
    }
  }

  // Sort toward target with jitter (OpenFrontIO does this to look organic)
  initialFrontier.sort((a, b) => {
    const ax = a % GRID_W, ay = Math.floor(a / GRID_W);
    const bx = b % GRID_W, by = Math.floor(b / GRID_W);
    const da = Math.hypot(ax - tx, ay - ty) + (Math.random() - 0.5) * FRONTIER_JITTER;
    const db = Math.hypot(bx - tx, by - ty) + (Math.random() - 0.5) * FRONTIER_JITTER;
    return da - db;
  });

  atkState = {
    targetIdx,
    targetX: tx,
    targetY: ty,
    committedTroops: committed,
    spentTroops: 0,
    frontier: initialFrontier,
    visited,
    tilesConquered: 0,
    startTiles: tileCounts[myId] || 0,
  };

  document.getElementById('attack-prog-wrap').style.display = 'block';
  document.getElementById('attack-btn').textContent = '⚔ Attacking — click to cancel';
  document.getElementById('attack-btn').classList.add('active');

  atkState.interval = setInterval(attackTick, TICK_MS);
  attackTick();
}

function attackTick() {
  if (!atkState) return;
  const myPidx = getPlayerIdx(myId);
  const me = players[myId];
  const { targetX, targetY } = atkState;

  // ── Speed: tiles per tick scales with remaining committed troops ──
  // More troops committed → faster expansion (like larger player = faster in OpenFrontIO)
  const remainingRatio = 1 - atkState.spentTroops / atkState.committedTroops;
  const speed = Math.min(SPEED_MAX, Math.max(SPEED_MIN,
    Math.floor((atkState.committedTroops - atkState.spentTroops) / SPEED_DIVISOR)
  ));

  const wave = atkState.frontier.splice(0, speed);
  const nextTiles = [];
  const claimedThisWave = [];

  for (const tileIdx of wave) {
    if (!atkState) break;  // cancelled mid-tick

    // Already ours (race condition — skip)
    if (gridOwner[tileIdx] === myPidx) continue;

    // ── Troop cost per tile (mirrors OpenFrontIO attacker loss formula) ──
    // cost = ATTRITION_PER_TILE * (0.5 + 0.5 * defenderDensity)
    // defenderDensity = clamp(defenderTroops / defenderTiles, 0, 2)
    let troopCost = ATTRITION_PER_TILE;
    const defPidx = gridOwner[tileIdx];
    if (defPidx) {
      const defPid = idxPlayer[defPidx];
      const defPlayer = defPid ? players[defPid] : null;
      const defTiles  = (defPid ? tileCounts[defPid] : 0) || 1;
      const defTroops = defPlayer ? (defPlayer.troops || 0) : 0;
      // Shield value: defender troop density per tile (clamped 0–2)
      const defShield = Math.min(2, defTroops / defTiles);
      // Attacker cost: base × (0.5 + 0.5 × shield) — matches OpenFrontIO formula shape
      troopCost = ATTRITION_PER_TILE * (0.5 + 0.5 * defShield);
      // Defender also loses troops proportional to their density
      if (defPlayer) {
        defPlayer.troops = Math.max(0, defPlayer.troops - defTiles > 0 ? defPlayer.troops / defTiles : 0);
      }
    }

    // Spend troops
    atkState.spentTroops += troopCost;

    // Out of committed troops → stop (OpenFrontIO: attack stalls when you run out)
    if (atkState.spentTroops >= atkState.committedTroops) {
      cancelAttack();
      toast('Troops exhausted — expand more to continue', 'info', 2500);
      return;
    }

    // Claim the tile
    claimTile(tileIdx, myId);
    claimedThisWave.push(tileIdx);
    atkState.tilesConquered++;

    const cid = cellToCountry(tileIdx);
    if (cid) {
      territories[cid] = myId;
      if (players[myId]) players[myId].territories.add(cid);
      send({ type: 'attack', territory: cid, attackRatio });
    }

    // Expand frontier from newly claimed tile
    for (const n of cellNeighbors(tileIdx)) {
      if (gridLand[n] && gridOwner[n] !== myPidx && !atkState.visited[n]) {
        atkState.visited[n] = 1;
        nextTiles.push(n);
      }
    }
  }

  // Broadcast pixel claims to other players
  if (claimedThisWave.length > 0) {
    send({ type: 'tile_claim', tiles: claimedThisWave });
  }

  // ── Insert new frontier tiles, sorted toward target ───────────
  // Only re-sort the additions so we don't re-sort the whole array every tick.
  // If frontier is small enough, do a full sort for accuracy.
  if (nextTiles.length > 0) {
    for (const n of nextTiles) atkState.frontier.push(n);
    if (atkState.frontier.length < 2000) {
      atkState.frontier.sort((a, b) => {
        const ax = a % GRID_W, ay = Math.floor(a / GRID_W);
        const bx = b % GRID_W, by = Math.floor(b / GRID_W);
        const da = Math.hypot(ax - targetX, ay - targetY) + (Math.random() - 0.5) * FRONTIER_JITTER;
        const db = Math.hypot(bx - targetX, by - targetY) + (Math.random() - 0.5) * FRONTIER_JITTER;
        return da - db;
      });
    }
  }

  // ── Update attack progress bar ────────────────────────────────
  const spentPct = Math.min(100, (atkState.spentTroops / atkState.committedTroops) * 100);
  document.getElementById('attack-prog').style.width = spentPct + '%';

  updateSelfCard();
  checkVictory();

  // ── Victory condition: target tile reached ────────────────────
  if (atkState && gridOwner[atkState.targetIdx] === myPidx) {
    cancelAttack();
    toast(`Target reached! +${atkState ? atkState.tilesConquered : ''} tiles`, 'success', 2500);
    return;
  }

  // ── No more frontier tiles → attack ended ────────────────────
  if (!atkState || atkState.frontier.length === 0) {
    cancelAttack();
    return;
  }
}

// ══════════════════════════════════════════════
//  DRAW LOOP
// ══════════════════════════════════════════════
function startLoop() {
  (function loop(t) {
    pulseT = t;
    redraw();
    requestAnimationFrame(loop);
  })(0);
}

let _gridOff = null, _gridOffCtx = null, _gridImg = null;

function ensureGridOffscreen() {
  if (!_gridOff) {
    _gridOff    = document.createElement('canvas');
    _gridOff.width  = GRID_W;
    _gridOff.height = GRID_H;
    _gridOffCtx = _gridOff.getContext('2d');
    _gridImg    = new ImageData(GRID_W, GRID_H);
  }
}

function drawGrid() {
  if (!gridLand || !gridOwner) return;
  ensureGridOffscreen();

  const d = _gridImg.data;
  for (let i = 0; i < GRID_W * GRID_H; i++) {
    const pi    = i * 4;
    const land  = gridLand[i];
    const owner = gridOwner[i];

    if (!land) {
      d[pi]   = 8;
      d[pi+1] = 14;
      d[pi+2] = 30;
      d[pi+3] = 255;
    } else if (!owner) {
      d[pi]   = 26;
      d[pi+1] = 26;
      d[pi+2] = 16;
      d[pi+3] = 255;
    } else {
      const rgb = getPidxRgb(owner);
      if (rgb) {
        d[pi]   = rgb[0];
        d[pi+1] = rgb[1];
        d[pi+2] = rgb[2];
        d[pi+3] = 210;
      } else {
        d[pi] = d[pi+1] = d[pi+2] = 70;
        d[pi+3] = 255;
      }
    }
  }

  _gridOffCtx.putImageData(_gridImg, 0, 0);

  const sx = transform.x;
  const sy = transform.y;
  const sw = canvas.width  * transform.k;
  const sh = canvas.height * transform.k;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(_gridOff, sx, sy, sw, sh);
}

function redraw() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#080e1e';
  ctx.fillRect(0, 0, w, h);

  drawGrid();

  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  features.forEach(f => {
    ctx.beginPath(); pathGen(f);
    ctx.strokeStyle = 'rgba(201,168,76,0.2)';
    ctx.lineWidth = 0.5 / transform.k;
    ctx.stroke();
  });

  ctx.beginPath(); pathGen(d3.geoGraticule()());
  ctx.strokeStyle = 'rgba(201,168,76,0.03)';
  ctx.lineWidth = 0.3 / transform.k;
  ctx.stroke();

  Object.entries(players).forEach(([id, p]) => {
    if (!p.dot) return;
    const [px, py] = projection(p.dot);
    const isMe  = id === myId;
    const baseR = isMe ? 7 : 5.5;
    const pulse = Math.sin(pulseT / (isMe ? 280 : 450) + (parseInt(id, 16) || 0) * 0.1) * 2;
    const r     = (baseR + pulse) / transform.k;

    const grd = ctx.createRadialGradient(px, py, 0, px, py, r * 3);
    grd.addColorStop(0, p.color + '55');
    grd.addColorStop(1, p.color + '00');
    ctx.beginPath(); ctx.arc(px, py, r * 3, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1 / transform.k; ctx.stroke();

    if (myPlaced || !isMe) {
      const ringR = (baseR + 5 + Math.sin(pulseT / 600) * 3) / transform.k;
      ctx.beginPath(); ctx.arc(px, py, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = p.color + '50';
      ctx.lineWidth = 1.2 / transform.k; ctx.stroke();
    }

    if (isMe || transform.k > 1.5) {
      ctx.font = `${Math.max(8, 9 / transform.k)}px Cinzel`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(fmtNum(p.troops || 0), px, py - r - 4 / transform.k);
    }
  });

  // Draw target reticle when attack is active
  if (atkState) {
    const [sx2, sy2] = cellToScreen(atkState.targetIdx);
    const pulse2 = 0.5 + 0.5 * Math.sin(pulseT / 200);
    ctx.save();
    ctx.strokeStyle = `rgba(201,76,76,${0.5 + 0.5 * pulse2})`;
    ctx.lineWidth = 2;
    const rs = 10 + pulse2 * 4;
    // Crosshair reticle
    ctx.beginPath();
    ctx.arc(sx2, sy2, rs, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx2 - rs - 4, sy2); ctx.lineTo(sx2 + rs + 4, sy2);
    ctx.moveTo(sx2, sy2 - rs - 4); ctx.lineTo(sx2, sy2 + rs + 4);
    ctx.strokeStyle = `rgba(201,76,76,${0.3 + 0.4 * pulse2})`;
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
  drawMinimap();
  updateTroopBar();
}

let _mmOff = null, _mmOffCtx = null;

function drawMinimap() {
  mmCtx.clearRect(0, 0, 150, 84);
  mmCtx.fillStyle = '#080e1e';
  mmCtx.fillRect(0, 0, 150, 84);

  if (_gridOff) {
    if (!_mmOff) {
      _mmOff    = document.createElement('canvas');
      _mmOff.width = 150; _mmOff.height = 84;
      _mmOffCtx = _mmOff.getContext('2d');
    }
    _mmOffCtx.imageSmoothingEnabled = true;
    _mmOffCtx.drawImage(_gridOff, 0, 0, 150, 84);
    mmCtx.drawImage(_mmOff, 0, 0);
  }

  if (projection) {
    const mmProj = d3.geoNaturalEarth1().scale(24).translate([75, 44]);
    Object.values(players).forEach(p => {
      if (!p.dot) return;
      const [px, py] = mmProj(p.dot);
      mmCtx.beginPath(); mmCtx.arc(px, py, 2.5, 0, Math.PI * 2);
      mmCtx.fillStyle = p.color; mmCtx.fill();
    });
  }

  const vx = (-transform.x / transform.k) * (150 / canvas.width);
  const vy = (-transform.y / transform.k) * (84  / canvas.height);
  const vw = 150 / transform.k, vh = 84 / transform.k;
  mmCtx.strokeStyle = 'rgba(201,168,76,0.7)'; mmCtx.lineWidth = 1;
  mmCtx.strokeRect(vx, vy, vw, vh);
}

function updateTroopBar() {
  const me = players[myId]; if (!me) return;
  const pct = me.maxTroops > 0 ? me.troops / me.maxTroops : 0;
  const bar = document.getElementById('troop-bar');
  bar.style.width = (pct * 100) + '%';
  bar.className = 'troop-bar ' + (pct > 0.85 ? 'near-max' : pct > 0.35 && pct < 0.50 ? 'optimal' : pct < 0.15 ? 'low' : '');
}

// ══════════════════════════════════════════════
//  ZOOM / PAN
// ══════════════════════════════════════════════
function applyZoom(factor, cx, cy) {
  const newK = Math.min(Math.max(transform.k * factor, 0.45), 22);
  transform.x = cx - (cx - transform.x) * (newK / transform.k);
  transform.y = cy - (cy - transform.y) * (newK / transform.k);
  transform.k = newK;
}
function zoomBy(f) { applyZoom(f, canvas.width/2, canvas.height/2); }
function resetZoom() { transform = {x:0,y:0,k:1}; }

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  applyZoom(e.deltaY < 0 ? 1.12 : 0.89, e.clientX, e.clientY);
}, { passive: false });

canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const ids = Object.keys(pointers);
  if (ids.length === 1) {
    isDragging = false;
    dragStart  = { x: e.clientX - transform.x, y: e.clientY - transform.y };
  } else if (ids.length === 2) {
    const [a, b] = ids.map(id => pointers[id]);
    pinchStart = {
      dist: Math.hypot(b.x - a.x, b.y - a.y),
      cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2,
      tx: transform.x, ty: transform.y, tk: transform.k,
    };
    isDragging = false;
  }
});

canvas.addEventListener('pointermove', e => {
  if (!pointers[e.pointerId]) return;
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const ids = Object.keys(pointers);

  if (ids.length >= 2 && pinchStart) {
    const [a, b] = ids.slice(0, 2).map(id => pointers[id]);
    const dist  = Math.hypot(b.x - a.x, b.y - a.y);
    const cx    = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
    const scale = dist / pinchStart.dist;
    const newK  = Math.min(Math.max(pinchStart.tk * scale, 0.45), 22);
    const mdx   = cx - pinchStart.cx, mdy = cy - pinchStart.cy;
    transform.x = pinchStart.tx * (newK / pinchStart.tk) + mdx + cx * (1 - newK / pinchStart.tk);
    transform.y = pinchStart.ty * (newK / pinchStart.tk) + mdy + cy * (1 - newK / pinchStart.tk);
    transform.k = newK;
    return;
  }

  if (ids.length === 1) {
    const dx = e.clientX - (transform.x + dragStart.x);
    const dy = e.clientY - (transform.y + dragStart.y);
    if (!isDragging && Math.hypot(dx, dy) > 4) isDragging = true;
    if (isDragging) {
      transform.x = e.clientX - dragStart.x;
      transform.y = e.clientY - dragStart.y;
    }
  }
});

canvas.addEventListener('pointerup', e => {
  const wasOne  = Object.keys(pointers).length === 1;
  const wasDrag = isDragging;
  delete pointers[e.pointerId];
  if (Object.keys(pointers).length < 2) pinchStart = null;
  if (Object.keys(pointers).length === 0) isDragging = false;
  if (wasOne && !wasDrag) handleClick(e.clientX, e.clientY);
});

canvas.addEventListener('pointercancel', e => {
  delete pointers[e.pointerId];
  if (Object.keys(pointers).length < 2) pinchStart = null;
});

// ══════════════════════════════════════════════
//  CLICK HANDLER
// ══════════════════════════════════════════════
function handleClick(cx, cy) {
  if (phase === 'placement') {
    if (myPlaced) return;
    const cellIdx = screenToCell(cx, cy);
    if (cellIdx < 0 || !gridLand[cellIdx]) {
      toast('Click on land to place your base', 'error', 2000);
      return;
    }
    const gx0 = cellIdx % GRID_W, gy0 = Math.floor(cellIdx / GRID_W);
    const geo  = gridProj.invert([gx0 + 0.5, gy0 + 0.5]);
    players[myId].dot = geo;
    myPlaced = true;

    seedPlayerTiles(cellIdx, myId, 5);

    const cid = cellToCountry(cellIdx);
    if (cid) {
      territories[cid] = myId;
      if (players[myId]) players[myId].territories.add(cid);
    }
    send({ type: 'place_dot', geo, countryId: cid || 0 });
    toast('Base established!', 'success', 2000);

  } else if (phase === 'game') {
    const cellIdx = screenToCell(cx, cy);
    if (cellIdx < 0) return;
    const myPidx = getPlayerIdx(myId);

    // Clicking own tile cancels current attack
    if (gridOwner[cellIdx] === myPidx) {
      cancelAttack();
      return;
    }

    // Start new attack (cancels any existing one)
    startAttack(cellIdx);
  }
}

function screenToGeo(cx, cy) {
  return projection.invert([(cx - transform.x) / transform.k, (cy - transform.y) / transform.k]);
}

function featureAt(cx, cy) {
  for (const f of features) {
    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);
    ctx.beginPath(); pathGen(f);
    const hit = ctx.isPointInPath(cx, cy);
    ctx.restore();
    if (hit) return f;
  }
  return null;
}

// ══════════════════════════════════════════════
//  SLIDER HANDLERS
// ══════════════════════════════════════════════
function onWorkerSlider(val) {
  workerRatio = val / 100;
  document.getElementById('worker-pct').textContent = val + '%';
  send({ type: 'set_worker_ratio', ratio: workerRatio });
}

function onAttackSlider(val) {
  attackRatio = val / 100;
  document.getElementById('attack-pct').textContent = val + '%';
}

// ══════════════════════════════════════════════
//  PLACEMENT TIMER
// ══════════════════════════════════════════════
function startPlacementTimer() {
  phase     = 'placement';
  timerLeft = PLACEMENT_SECS;
  document.getElementById('placement-overlay').style.display = 'flex';
  document.getElementById('phase-label').textContent = 'Placement Phase — click land to drop your base';
  updateTimerArc(timerLeft);

  timerInterval = setInterval(() => {
    timerLeft--;
    document.getElementById('timer-num').textContent = timerLeft;
    updateTimerArc(timerLeft);
    if (timerLeft <= 0) { clearInterval(timerInterval); endPlacement(); }
  }, 1000);
}

function updateTimerArc(t) {
  const frac   = t / PLACEMENT_SECS;
  document.getElementById('timer-arc').style.strokeDashoffset = CIRC * (1 - frac);
  const urgent = t <= 5;
  document.getElementById('timer-arc').style.stroke = urgent ? '#c94c4c' : 'var(--gold)';
  document.getElementById('timer-num').style.color  = urgent ? '#c94c4c' : 'var(--gold)';
}

function endPlacement() {
  if (!myPlaced && myId) {
    let startIdx = -1;
    for (let attempt = 0; attempt < 10000 && startIdx < 0; attempt++) {
      const i = Math.floor(Math.random() * GRID_W * GRID_H);
      if (gridLand[i]) startIdx = i;
    }
    if (startIdx >= 0) {
      const gx  = startIdx % GRID_W, gy = Math.floor(startIdx / GRID_W);
      const geo = gridProj ? gridProj.invert([gx + 0.5, gy + 0.5]) : [0, 0];
      players[myId].dot = geo;
      myPlaced = true;
      seedPlayerTiles(startIdx, myId, 3);
      const cid = cellToCountry(startIdx);
      if (cid) {
        territories[cid] = myId;
        if (players[myId]) players[myId].territories.add(cid);
      }
      send({ type: 'place_dot', geo, countryId: cid || 0 });
      toast('Base placed randomly', 'info', 2500);
    }
  }
  document.getElementById('placement-overlay').style.display = 'none';
  document.getElementById('phase-label').textContent = 'Campaign — click any tile to expand';
  phase = 'game';
  toast('Expand your empire!', 'success', 3000);
  setInterval(checkEnclosures, 3000);
}

// ══════════════════════════════════════════════
//  ENCLOSURE + VICTORY
// ══════════════════════════════════════════════
function checkEnclosures() {
  if (!myId || phase !== 'game') return;
  const myTerr = players[myId]?.territories;
  if (!myTerr || myTerr.size === 0) return;

  const enclosed = [];
  for (const f of features) {
    const id        = +f.id;
    if (territories[id] === myId) continue;
    const neighbors = adjacency[id] || new Set();
    if (!neighbors.size) continue;
    let allMine = true;
    for (const nid of neighbors) {
      if (territories[nid] !== myId) { allMine = false; break; }
    }
    if (allMine) enclosed.push(id);
  }
  if (enclosed.length > 0) send({ type: 'claim_enclosure', territories: enclosed });
}

function checkVictory() {
  const landTotal = landTileTotal || 1;
  for (const [pid, p] of Object.entries(players)) {
    const owned = tileCounts[pid] || 0;
    const pct   = owned / landTotal;
    if (pct >= WIN_PCT) {
      document.getElementById('victory-sub').textContent = pid === myId
        ? `You have conquered ${Math.round(pct * 100)}% of the world.`
        : `${p.name} has dominated ${Math.round(pct * 100)}% of the world.`;
      document.getElementById('victory-overlay').classList.add('show');
    }
  }
}

// ══════════════════════════════════════════════
//  PLAYER TOOLTIP
// ══════════════════════════════════════════════
const ptt = document.getElementById('player-tooltip');

function showPlayerTooltip(id, cx, cy) {
  const p         = players[id]; if (!p) return;
  const owned     = tileCounts[id] || 0;
  const landTotal = landTileTotal || 1;
  const pct       = landTotal > 0 ? ((owned / landTotal) * 100).toFixed(1) : 0;

  document.getElementById('ptt-name').textContent        = p.name;
  document.getElementById('ptt-troops').textContent      = fmtNum(p.troops || 0);
  document.getElementById('ptt-territories').textContent = owned;
  document.getElementById('ptt-pct').textContent         = pct + '%';
  ptt.style.left = cx + 'px';
  ptt.style.top  = (cy - 125) + 'px';
  ptt.classList.add('visible');
}
function hidePlayerTooltip() { ptt.classList.remove('visible'); }

// ══════════════════════════════════════════════
//  CAPTURE TERRITORY  (server → local sync)
// ══════════════════════════════════════════════
function captureTerritory(id, newOwner, prevOwner) {
  const prev = prevOwner || territories[id];
  if (prev && players[prev]) players[prev].territories.delete(+id);
  territories[id] = newOwner;
  if (players[newOwner]) players[newOwner].territories.add(+id);

  if (cellCountry) {
    const newPidx = getPlayerIdx(newOwner);
    for (let i = 0; i < GRID_W * GRID_H; i++) {
      if (cellCountry[i] !== +id) continue;
      const prevPidx = gridOwner[i];
      if (prevPidx === newPidx) continue;
      if (prevPidx) {
        const prevPid = idxPlayer[prevPidx];
        if (prevPid) tileCounts[prevPid] = (tileCounts[prevPid] || 1) - 1;
      }
      gridOwner[i] = newPidx;
      tileCounts[newOwner] = (tileCounts[newOwner] || 0) + 1;
    }
    pidxRgb[newPidx] = null;

    if (newOwner !== myId && players[newOwner] && !players[newOwner].dot) {
      const f = featureMap[+id];
      if (f) players[newOwner].dot = d3.geoCentroid(f);
    }
  }

  updateScoreboard();
  updateSelfCard();
}

// ══════════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════════
function connectWS(code, username) {
  ws = new WebSocket(`${SERVER_WS}/room/${code}`);
  ws.addEventListener('open', () => {
    send({ type: 'join', username, color: myColor, isHost: false, settings: { map: mapKey } });
  });
  ws.addEventListener('message', e => {
    try { handleMsg(JSON.parse(e.data)); } catch(err) { console.warn(err); }
  });
  ws.addEventListener('close', () => toast('Disconnected', 'error'));
  ws.addEventListener('error', () => toast('Connection error', 'error'));
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleMsg(msg) {
  switch (msg.type) {

    case 'welcome':
      myId    = msg.id;
      myColor = PLAYER_COLORS[Object.keys(players).length % PLAYER_COLORS.length];
      if (!players[myId]) players[myId] = {
        name: myName, color: myColor, dot: null,
        territories: new Set(), troops: 50, maxTroops: 1000, gold: 0,
      };
      document.getElementById('self-dot').style.background = myColor;
      updateSelfCard();
      startPlacementTimer();
      break;

    case 'playerList':
      msg.players.forEach((p, i) => {
        if (!players[p.id]) players[p.id] = {
          name: p.name, color: PLAYER_COLORS[i % PLAYER_COLORS.length],
          dot: null, territories: new Set(), troops: 50, maxTroops: 1000, gold: 0,
        };
      });
      updateScoreboard(); updateHUD(); break;

    case 'playerJoined':
      if (!players[msg.player.id]) {
        const idx = Object.keys(players).length;
        players[msg.player.id] = {
          name: msg.player.name, color: PLAYER_COLORS[idx % PLAYER_COLORS.length],
          dot: null, territories: new Set(), troops: 50, maxTroops: 1000, gold: 0,
        };
        toast(`${msg.player.name} joined`, 'info');
        updateScoreboard(); updateHUD();
      }
      break;

    case 'playerLeft':
      if (players[msg.id]) {
        const name = players[msg.id].name;
        for (const [tid, owner] of Object.entries(territories)) {
          if (owner === msg.id) delete territories[tid];
        }
        const pidx = playerIdx[msg.id];
        if (pidx) {
          for (let i = 0; i < gridOwner.length; i++) {
            if (gridOwner[i] === pidx) gridOwner[i] = 0;
          }
          delete pidxRgb[pidx];
        }
        players[msg.id].territories.clear();
        delete players[msg.id];
        toast(`${name} left`, 'info');
        updateScoreboard(); updateHUD();
      }
      break;

    case 'state_update':
      msg.players.forEach(p => {
        if (!players[p.id]) return;
        players[p.id].troops    = p.troops;
        players[p.id].maxTroops = p.maxTroops;
        players[p.id].gold      = p.gold;
      });
      document.getElementById('hud-turn').textContent = msg.tick;
      updateSelfCard();
      updateScoreboard();
      break;

    case 'dot_placed':
      if (players[msg.playerId]) players[msg.playerId].dot = msg.geo;
      if (msg.countryId !== undefined && msg.playerId !== myId) {
        if (msg.geo && gridLand && gridProj) {
          const [gx0, gy0] = gridProj(msg.geo);
          const gx = Math.floor(gx0), gy = Math.floor(gy0);
          if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
            const ci = gy * GRID_W + gx;
            if (gridLand[ci]) seedPlayerTiles(ci, msg.playerId, 3);
          }
        }
        captureTerritory(msg.countryId, msg.playerId, territories[msg.countryId]);
      }
      break;

    case 'tile_claim': {
      const ownerPid = msg.from;
      if (!ownerPid || ownerPid === myId) break;
      if (!players[ownerPid]) break;
      for (const tileIdx of (msg.tiles || [])) {
        if (tileIdx >= 0 && tileIdx < gridOwner.length && gridLand[tileIdx]) {
          claimTile(tileIdx, ownerPid);
        }
      }
      updateScoreboard();
      checkVictory();
      break;
    }

    case 'territory_captured':
      captureTerritory(msg.territory, msg.attackerId, msg.defenderId);
      if (msg.attackerId !== myId && players[msg.attackerId] && !players[msg.attackerId].dot) {
        const f = featureMap[msg.territory];
        if (f) players[msg.attackerId].dot = d3.geoCentroid(f);
      }
      checkVictory();
      break;

    case 'enclosure_claimed':
      (msg.territories || []).forEach(tid => {
        captureTerritory(tid, msg.playerId, territories[tid]);
      });
      if (msg.playerId === myId && msg.territories?.length) {
        toast(`Enclosure! +${msg.territories.length} territories`, 'success', 2500);
      }
      checkVictory();
      break;

    case 'territory_claimed':
      captureTerritory(msg.territory, msg.playerId, null);
      break;

    case 'attack_start':
    case 'attack_end':
    case 'pong':
      break;

    default:
      if (msg.from && msg.geo && players[msg.from]) players[msg.from].dot = msg.geo;
  }
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateSelfCard() {
  const me = players[myId]; if (!me) return;

  document.getElementById('self-name').textContent        = me.name;
  document.getElementById('self-territories').textContent = tileCounts[myId] || 0;
  document.getElementById('self-troops').textContent      = fmtNum(Math.floor(me.troops || 0));
  document.getElementById('self-max').textContent         = fmtNum(me.maxTroops || 0);
  document.getElementById('hud-gold').textContent         = fmtNum(Math.floor(me.gold || 0));
  document.getElementById('self-dot').style.background    = me.color;
}

function updateScoreboard() {
  const list = document.getElementById('score-list');
  list.innerHTML = '';

  const landTotal = landTileTotal || 1;
  const rows = Object.entries(players).map(([id, p]) => {
    return { id, p, owned: tileCounts[id] || 0 };
  }).sort((a, b) => b.owned - a.owned);

  rows.forEach(({ id, p, owned }) => {
    const pct = landTotal > 0 ? ((owned / landTotal) * 100).toFixed(1) : '0.0';
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `
      <div class="score-dot" style="background:${p.color}"></div>
      <span class="score-name">${escHtml(p.name)}${id===myId?' <span style="color:var(--text-muted);font-size:11px">(you)</span>':''}</span>
      <span class="score-val">${pct}% · ${fmtNum(Math.floor(p.troops||0))}</span>
    `;
    list.appendChild(row);
  });
}

function updateHUD() {
  document.getElementById('hud-players').textContent = Object.keys(players).length;
  document.getElementById('hud-map').textContent     = mapKey.charAt(0).toUpperCase() + mapKey.slice(1);
}

// ══════════════════════════════════════════════
//  UTIL
// ══════════════════════════════════════════════
function toast(msg, type = 'info', dur = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function fmtNum(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return String(Math.floor(n));
}

function escHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) send({ type: 'ping', t: Date.now() });
}, 15000);

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
async function boot() {
  const params = getParams();
  roomCode = params.room; mapKey = params.map; myName = params.username;
  myColor  = PLAYER_COLORS[0];
  document.getElementById('hud-map').textContent = mapKey.charAt(0).toUpperCase() + mapKey.slice(1);
  resize();
  await loadMap();
  startLoop();
  connectWS(roomCode, myName);
}
boot();
</script>
